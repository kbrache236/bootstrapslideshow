<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">

  <!-- Bootstrap Links -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <link rel="stylesheet" href="styles/main.css">

  <title>Bootstrap Slideshow</title>
</head>

<body>
  <div class="p-5 bg-primary text-white header">
    <img src="images/logofrog.png" alt="logo">
    <div>
      <h1>Frogs</h1>
      <p>Look at all the colorful frogs!</p>
    </div>
  </div>

  <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
    <div class="container-fluid">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="#">Active</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" href="#">Disabled</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Carousel -->
  <div id="demo" class="carousel slide" data-bs-ride="carousel">

    <!-- Indicators/dots -->
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="3"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="4"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="5"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="6"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="7"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="8"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="9"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="10"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="11"></button>
      <button type="button" data-bs-target="#demo" data-bs-slide-to="12"></button>
    </div>

    <!-- The slideshow/carousel -->
    <div class="carousel-inner">
      <div class="carousel-item active">
        <img src="images/frog_01.jpg" alt="frog_01" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_02.jpg" alt="frog_02" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_03.jpg" alt="frog_03" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_04.jpg" alt="frog_04" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_05.jpg" alt="frog_05" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_06.jpg" alt="frog_06" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_07.jpg" alt="frog_07" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_08.jpg" alt="frog_08" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_09.jpg" alt="frog_09" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_10.jpg" alt="frog_10" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_11.jpg" alt="frog_11" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_12.jpg" alt="frog_12" class="d-block">
      </div>
      <div class="carousel-item">
        <img src="images/frog_13.jpg" alt="frog_13" class="d-block">
      </div>
    </div>

    <!-- Left and right controls/icons -->
    <!-- <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button> -->
  </div>

  <div class="mt-5 p-4 bg-dark text-white text-center footer">
    <p>&copy;<span id="copyright"></span> Kiara Brache Productions</p>
  </div>

</body>

</html>
